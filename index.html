<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FEHD 車輛管理系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #121212;
            color: #e0e0e0;
        }
        .navbar {
            background-color: #1f1f1f !important;
            border-bottom: 1px solid #2d2d2d;
        }
        .card {
            background-color: #1e1e1e;
            border: 1px solid #2d2d2d;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .card-header {
            background-color: #252525;
            border-bottom: 1px solid #2d2d2d;
            font-weight: 500;
        }
        .table {
            color: #e0e0e0;
        }
        .table-dark {
            background-color: #1e1e1e;
        }
        .table-striped tbody tr:nth-of-type(odd) {
            background-color: #242424;
        }
        .table-hover tbody tr:hover {
            background-color: #2a2a2a;
            color: #ffffff;
        }
        .modal-content {
            background-color: #1e1e1e;
            color: #e0e0e0;
            border: 1px solid #3d3d3d;
        }
        .modal-header {
            border-bottom: 1px solid #3d3d3d;
            background-color: #252525;
        }
        .modal-footer {
            border-top: 1px solid #3d3d3d;
        }
        .form-control, .form-select {
            background-color: #2b2b2b;
            border: 1px solid #3d3d3d;
            color: #ffffff;
        }
        .form-control:focus, .form-select:focus {
            background-color: #333333;
            color: #ffffff;
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
        }
        .btn-primary { background-color: #0d6efd; border: none; }
        .btn-success { background-color: #198754; border: none; }
        .btn-danger { background-color: #dc3545; border: none; }
        
        /* 保持原本的讀取遮罩結構，並融入客製化 Wheel Spinner 特效 */
        #loadingSpinner {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        /* 植入專屬的 3秒速度齒輪旋轉外環與 Logo 容器，預設在純讀取時隱藏 */
        .custom-wheel-container {
            position: relative;
            width: 120px;
            height: 120px;
            display: none; /* 只有登入驗證時才會透過 JS 顯示 */
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }
        .wheel-outer-gear {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 5px dashed #198754;
            border-radius: 50%;
            animation: spinWheel 3s linear infinite; /* 嚴格 3 秒一圈速度 */
        }
        .wheel-logo-img {
            width: 70px;
            height: 70px;
            object-fit: contain;
            z-index: 10;
        }
        @keyframes spinWheel {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="loadingSpinner" class="d-none">
        <div id="loginWheelWrapper" class="custom-wheel-container">
            <div class="wheel-outer-gear" id="wheelGearBorder"></div>
            <img src="" id="wheelLogoElement" class="wheel-logo-img" alt="Department Logo">
        </div>
        <div id="normalSpinnerIcon" class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;"></div>
        <span class="mt-3 text-light font-monospace" id="loadingTextStatus">系統處理中，請稍候...</span>
    </div>

    <nav class="navbar navbar-expand-lg navbar-dark px-4">
        <div class="container-fluid">
            <a class="navbar-brand text-success fw-bold" href="#">
                <i class="fa-solid fa-truck-moving me-2"></i>FEHD 車輛管理系統
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item me-3">
                        <span id="userInfoStatus" class="badge bg-secondary p-2"><i class="fa-solid fa-user me-1"></i>未登入</span>
                    </li>
                    <li class="nav-item">
                        <button id="authBtn" class="btn btn-outline-light btn-sm" onclick="triggerAuthAction()">
                            <i class="fa-solid fa-right-to-bracket me-1"></i>登入
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid p-4">
        <div class="row g-3 mb-4 text-center">
            <div class="col-md-3">
                <div class="card p-3">
                    <div class="text-muted small uppercase fw-bold">有效授權車輛總數</div>
                    <div class="display-6 fw-bold text-primary mt-1" id="statTotalVehicles">0</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card p-3">
                    <div class="text-muted small uppercase fw-bold">今日新增處理</div>
                    <div class="display-6 fw-bold text-success mt-1" id="statTodayAdded">0</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card p-3">
                    <div class="text-muted small uppercase fw-bold">凌晨授權 (Y)</div>
                    <div class="display-6 fw-bold text-warning mt-1" id="statMidnightCount">0</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card p-3">
                    <div class="text-muted small uppercase fw-bold">當前區域上限餘額</div>
                    <div class="display-6 fw-bold text-info mt-1" id="statQuotaStatus">--</div>
                </div>
            </div>
        </div>

        <div class="card p-3 mb-4">
            <div class="row g-3 align-items-center justify-content-between">
                <div class="col-md-6 d-flex flex-wrap gap-2">
                    <button class="btn btn-primary" onclick="openAddModal()">
                        <i class="fa-solid fa-plus me-1"></i>單筆新增車輛
                    </button>
                    <button id="adminUploadBtn" class="btn btn-success d-none" onclick="openUploadModal()">
                        <i class="fa-solid fa-file-excel me-1"></i>系統 Master Excel 上傳
                    </button>
                    <button class="btn btn-outline-info" onclick="exportExcel()">
                        <i class="fa-solid fa-file-export me-1"></i>匯出 Excel 報表
                    </button>
                </div>
                <div class="col-md-4">
                    <div class="input-group">
                        <span class="input-group-text bg-dark text-muted border-secondary"><i class="fa-solid fa-magnifying-glass"></i></span>
                        <input type="text" id="tableSearchInput" class="form-control border-secondary" placeholder="搜尋車牌、區域..." onkeyup="filterTableData()">
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center py-3">
                <span><i class="fa-solid fa-list me-2 text-primary"></i>當前權限內有效授權名冊</span>
                <button class="btn btn-sm btn-outline-secondary" onclick="loadVehicles(true)"><i class="fa-solid fa-rotate me-1"></i>重新整理</button>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-dark table-striped table-hover mb-0" id="vehicleMainTable">
                        <thead>
                            <tr>
                                <th>車牌號碼</th>
                                <th>PGVW (噸)</th>
                                <th>開始日期</th>
                                <th>有效日期</th>
                                <th>車輛每日上限</th>
                                <th>凌晨授權</th>
                                <th>所屬區域</th>
                                <th>區域每日上限</th>
                                <th class="text-center">操作</th>
                            </tr>
                        </thead>
                        <tbody id="vehicleTableBody">
                            <tr>
                                <td colspan="9" class="text-center py-4 text-muted">請先登入系統以載入數據。</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="loginModal" data-bs-backdrop="static" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fa-solid fa-lock me-2 text-warning"></i>FEHD 安全管理認證</h5>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">管理主管單位 / 部門</label>
                        <select id="loginDeptSelect" class="form-select">
                            <option value="FEHD">食物環境衞生署 (FEHD)</option>
                            <option value="EPD">環境保護署 (EPD)</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">用戶帳號</label>
                        <input type="text" id="loginUserId" class="form-control" placeholder="請輸入您的登入 ID">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">密碼</label>
                        <input type="password" id="loginPassword" class="form-control" placeholder="請輸入密碼">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary w-100" onclick="executeLoginProc()">驗證並登入</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="addVehicleModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fa-solid fa-plus-circle me-2 text-success"></i>手動新增授權車輛</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addVehicleForm">
                        <div class="mb-3">
                            <label class="form-label">車牌號碼 *</label>
                            <input type="text" id="formPlate" class="form-control text-uppercase" required placeholder="例如: AB1234">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">PGVW (總重量噸數)</label>
                            <input type="number" step="0.01" id="formPgvw" class="form-control" placeholder="例如: 24">
                        </div>
                        <div class="row mb-3">
                            <div class="col">
                                <label class="form-label">開始日期</label>
                                <input type="date" id="formStartDate" class="form-control">
                            </div>
                            <div class="col">
                                <label class="form-label">有效截止日期 *</label>
                                <input type="date" id="formExpiryDate" class="form-control" required>
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col">
                                <label class="form-label">車輛每日上限</label>
                                <input type="number" id="formVehicleLimit" class="form-control" value="5">
                            </div>
                            <div class="col">
                                <label class="form-label">凌晨授權</label>
                                <select id="formMidnight" class="form-select">
                                    <option value="N">N (否)</option>
                                    <option value="Y">Y (是)</option>
                                </select>
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col">
                                <label class="form-label">所屬區域 *</label>
                                <select id="formDistrict" class="form-select" required></select>
                            </div>
                            <div class="col">
                                <label class="form-label">區域每日上限</label>
                                <input type="number" id="formDistrictLimit" class="form-control" value="0">
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="executeAddVehicle()">確定儲存</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="uploadModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fa-solid fa-cloud-arrow-up me-2 text-success"></i>上傳全系統 Master Excel 檔案</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="alert alert-info py-2 small">
                        <i class="fa-solid fa-circle-info me-1"></i>系統將會自動辨識並將內含的：Vehicles, Users, Expired, DistrictQuota, Midnight Limit, Email 等工作表分流寫入個別的 R2 雲端儲存庫。
                    </div>
                    <div class="mb-4 mt-3">
                        <label class="form-label fw-bold">選擇要匯入的 Excel 母檔 (.xlsx)</label>
                        <input type="file" id="excelFilePicker" class="form-control" accept=".xlsx, .xls">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">關閉</button>
                    <button type="button" class="btn btn-success" onclick="triggerExcelProcessing()">解析並自動分流</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // 全局核心狀態變數
        let currentUserSession = null;
        let allVehiclesCached = [];
        const WORKER_ENDPOINT = "https://vehicle-api.tdgwkts.workers.dev/exec";

        const HK_DISTRICTS = [
            "Central & Western", "Wan Chai", "Eastern", "Southern",
            "Sham Shui Po", "Kowloon City", "Wong Tai Sin", "Kwun Tong", "Mong Kok", "Yau Tsim",
            "Tuen Mun", "Yuen Long", "Sha Tin", "Kwai Tsing", "North", "Tai Po", "Sai Kung", "Tsuen Wan", "Islands",
            "HK, KLN & NT"
        ];

        window.addEventListener('DOMContentLoaded', () => {
            initializeDistrictDropdown();
            const loginModal = new bootstrap.Modal(document.getElementById('loginModal'));
            loginModal.show();
        });

        function initializeDistrictDropdown() {
            const dropdown = document.getElementById('formDistrict');
            dropdown.innerHTML = HK_DISTRICTS.map(d => `<option value="${d}">${d}</option>`).join('');
        }

        // 修改：整合標準讀取與客製化部門 3秒輪轉 Spinner 機制
        function showLoading(show, optDept = null) {
            const spinner = document.getElementById('loadingSpinner');
            const normalIcon = document.getElementById('normalSpinnerIcon');
            const wheelWrapper = document.getElementById('loginWheelWrapper');
            const logoImg = document.getElementById('wheelLogoElement');
            const gearBorder = document.getElementById('wheelGearBorder');
            const statusText = document.getElementById('loadingTextStatus');

            if (show) {
                if (optDept) {
                    // 執行登入驗證時：啟用客製化部門 3 秒齒輪旋轉 Spinner
                    normalIcon.style.display = 'none';
                    wheelWrapper.style.display = 'flex';
                    if (optDept === 'EPD') {
                        logoImg.src = "Logo/epd.png";
                        gearBorder.style.borderColor = "#0d6efd"; // EPD 使用藍色外圈
                        statusText.textContent = "環境保護署 (EPD) 認證空間安全載入中...";
                    } else {
                        logoImg.src = "Logo/fehd.svg";
                        gearBorder.style.borderColor = "#198754"; // FEHD 使用綠色外圈
                        statusText.textContent = "食物環境衞生署 (FEHD) 認證空間安全載入中...";
                    }
                } else {
                    // 一般資料處理時：保持你原來的標準藍色 Bootstrap 圖示
                    wheelWrapper.style.display = 'none';
                    normalIcon.style.display = 'inline-block';
                    statusText.textContent = "系統處理中，請稍候...";
                }
                spinner.classList.remove('d-none');
            } else {
                spinner.classList.add('d-none');
            }
        }

        // 登入功能驗證程序
        async function executeLoginProc() {
            const userId = document.getElementById('loginUserId').value.trim();
            const password = document.getElementById('loginPassword').value;
            const selectedDept = document.getElementById('loginDeptSelect').value;

            if (!userId || !password) {
                alert("請輸入完整的帳號密碼！");
                return;
            }

            // 呼叫升級後的 showLoading，自動判斷並渲染對應 Logo 資料夾圖案與 3 秒轉速
            showLoading(true, selectedDept);

            try {
                const response = await fetch(WORKER_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'login', userId, password })
                });

                const result = await response.json();
                
                // 增加短暫延遲，讓精美的輪轉 Spinner 不會因連線過快而閃過
                await new Promise(r => setTimeout(r, 1200));

                if (result.success) {
                    currentUserSession = result.session;
                    
                    document.getElementById('userInfoStatus').className = "badge bg-success p-2";
                    document.getElementById('userInfoStatus').innerHTML = `<i class="fa-solid fa-user me-1"></i>${currentUserSession.userId} (${currentUserSession.role})`;
                    document.getElementById('authBtn').innerHTML = `<i class="fa-solid fa-right-to-bracket me-1"></i>登出`;

                    if (currentUserSession.role === 'admin') {
                        document.getElementById('adminUploadBtn').classList.remove('d-none');
                    } else {
                        document.getElementById('adminUploadBtn').classList.add('d-none');
                    }

                    bootstrap.Modal.getInstance(document.getElementById('loginModal')).hide();

                    allVehiclesCached = result.initialVehicles || [];
                    renderVehicleTable(allVehiclesCached);
                    updateDashboardStats(allVehiclesCached);
                } else {
                    alert("登入失敗: " + result.msg);
                }
            } catch (err) {
                alert("連線後台時發生錯誤: " + err.message);
            } finally {
                showLoading(false);
            }
        }

        function triggerAuthAction() {
            if (currentUserSession) {
                currentUserSession = null;
                allVehiclesCached = [];
                document.getElementById('userInfoStatus').className = "badge bg-secondary p-2";
                document.getElementById('userInfoStatus').innerHTML = `<i class="fa-solid fa-user me-1"></i>未登入`;
                document.getElementById('authBtn').innerHTML = `<i class="fa-solid fa-right-to-bracket me-1"></i>登入`;
                document.getElementById('adminUploadBtn').classList.add('d-none');
                document.getElementById('vehicleTableBody').innerHTML = `<tr><td colspan="9" class="text-center py-4 text-muted">請先登入系統以載入數據。</td></tr>`;
                updateDashboardStats([]);
                new bootstrap.Modal(document.getElementById('loginModal')).show();
            } else {
                new bootstrap.Modal(document.getElementById('loginModal')).show();
            }
        }

        async function loadVehicles(forceNotify = false) {
            if (!currentUserSession) return;
            if (forceNotify) showLoading(true);

            try {
                const response = await fetch(WORKER_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'getVehicles', session: currentUserSession })
                });
                const result = await response.json();
                if (result.success) {
                    allVehiclesCached = result.data || [];
                    renderVehicleTable(allVehiclesCached);
                    updateDashboardStats(allVehiclesCached);
                }
            } catch (err) {
                console.error(err);
            } finally {
                if (forceNotify) showLoading(false);
            }
        }

        function formatYMD(val) {
            if (!val) return '--';
            if (typeof val === 'string') return val.split('T')[0];
            return val;
        }

        function renderVehicleTable(vehicles) {
            const tbody = document.getElementById('vehicleTableBody');
            tbody.innerHTML = '';

            const filtered = vehicles.filter(v => {
                if (currentUserSession.viewDistricts === "all") return true;
                if (Array.isArray(currentUserSession.viewDistricts)) {
                    return currentUserSession.viewDistricts.includes(v.district);
                }
                return v.district === currentUserSession.district;
            });

            if (filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="9" class="text-center py-4 text-muted">查無有效授權資料。</td></tr>`;
                return;
            }

            filtered.forEach(v => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="fw-bold text-success">${v.plate || v.車牌號碼 || '--'}</td>
                    <td>${v.pgvw || v.PGVW || '--'}</td>
                    <td>${formatYMD(v.startDate || v.開始日期)}</td>
                    <td>${formatYMD(v.expiryDate || v.有效日期)}</td>
                    <td>${v.vehicleDailyLimit || v.車輛每日上限 || 5}</td>
                    <td><span class="badge ${v.midnight === 'Y' || v.凌晨授權 === 'Y' ? 'bg-warning text-dark' : 'bg-secondary'}">${v.midnight || v.凌晨授權 || 'N'}</span></td>
                    <td>${v.district || v.所屬區域 || '--'}</td>
                    <td>${v.districtDailyLimit || v.區域每日上限 || 0}</td>
                    <td class="text-center">
                        <button class="btn btn-sm btn-danger py-0 px-2" onclick="executeDeleteVehicle('${v.plate || v.車牌號碼}')">
                            <i class="fa-solid fa-trash-can small"></i>
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function updateDashboardStats(vehicles) {
            const todayStr = new Date().toISOString().split('T')[0];
            const myVisible = vehicles.filter(v => {
                if (!currentUserSession || currentUserSession.viewDistricts === "all") return true;
                return Array.isArray(currentUserSession.viewDistricts) ? currentUserSession.viewDistricts.includes(v.district) : v.district === currentUserSession.district;
            });

            document.getElementById('statTotalVehicles').textContent = myVisible.length;
            document.getElementById('statMidnightCount').textContent = myVisible.filter(v => v.midnight === 'Y' || v.凌晨授權 === 'Y').length;
            document.getElementById('statTodayAdded').textContent = myVisible.filter(v => v.createdAt && v.createdAt.startsWith(todayStr)).length;

            if (currentUserSession && currentUserSession.viewDistricts !== "all") {
                document.getElementById('statQuotaStatus').textContent = currentUserSession.district;
                document.getElementById('statQuotaStatus').className = "display-6 fw-bold text-info fs-5 mt-2";
            } else {
                document.getElementById('statQuotaStatus').textContent = "ALL";
                document.getElementById('statQuotaStatus').className = "display-6 fw-bold text-secondary mt-1";
            }
        }

        function filterTableData() {
            const query = document.getElementById('tableSearchInput').value.toUpperCase();
            const rows = document.querySelectorAll('#vehicleTableBody tr');
            rows.forEach(row => {
                if (row.cells.length < 2) return;
                const matchPlate = row.cells[0].textContent.toUpperCase().includes(query);
                const matchDistrict = row.cells[6].textContent.toUpperCase().includes(query);
                row.style.display = (matchPlate || matchDistrict) ? '' : 'none';
            });
        }

        function openAddModal() {
            if (!currentUserSession) { alert("請先登入！"); return; }
            document.getElementById('addVehicleForm').reset();
            if (currentUserSession.viewDistricts !== "all") {
                document.getElementById('formDistrict').value = currentUserSession.district;
            }
            new bootstrap.Modal(document.getElementById('addVehicleModal')).show();
        }

        async function executeAddVehicle() {
            const plate = document.getElementById('formPlate').value.trim().toUpperCase();
            const pgvw = parseFloat(document.getElementById('formPgvw').value) || null;
            const startDate = document.getElementById('formStartDate').value || null;
            const expiryDate = document.getElementById('formExpiryDate').value;
            const vehicleDailyLimit = parseInt(document.getElementById('formVehicleLimit').value) || 5;
            const midnight = document.getElementById('formMidnight').value;
            const district = document.getElementById('formDistrict').value;

            if (!plate || !expiryDate || !district) {
                alert("請完整填寫必填項 (*)");
                return;
            }

            showLoading(true);
            try {
                const response = await fetch(WORKER_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'addVehicle',
                        session: currentUserSession,
                        data: { plate, pgvw, startDate, expiryDate, vehicleDailyLimit, midnight, district }
                    })
                });
                const result = await response.json();
                if (result.success) {
                    bootstrap.Modal.getInstance(document.getElementById('addVehicleModal')).hide();
                    await loadVehicles(false);
                } else {
                    alert("新增失敗: " + result.msg);
                }
            } catch (err) {
                alert(err.message);
            } finaly {
                showLoading(false);
            }
        }

        async function executeDeleteVehicle(plate) {
            if (!confirm(`確定註銷車牌 ${plate} 嗎？`)) return;
            showLoading(true);
            try {
                const response = await fetch(WORKER_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'deleteVehicle', session: currentUserSession, plate })
                });
                const result = await response.json();
                if (result.success) await loadVehicles(false);
                else alert("註銷失敗: " + result.msg);
            } catch (err) {
                alert(err.message);
            } finally {
                showLoading(false);
            }
        }

        function openUploadModal() {
            document.getElementById('excelFilePicker').value = '';
            new bootstrap.Modal(document.getElementById('uploadModal')).show();
        }

        function triggerExcelProcessing() {
            const picker = document.getElementById('excelFilePicker');
            if (!picker.files || picker.files.length === 0) {
                alert("請選擇 Excel 母檔！");
                return;
            }
            uploadSystemExcel(picker.files[0]);
        }

        // ==================== 100% 融入原有結構的新増擴充函數：多工作表自動拆分上傳 ====================
        async function uploadSystemExcel(file) {
            showLoading(true);
            try {
                const data = await file.arrayBuffer();
                const workbook = XLSX.read(data, { type: 'array' });
                
                const sheetMapping = {
                    "Vehicles": "vehicles.json",
                    "Users": "users.json",
                    "Expired": "expired.json",
                    "DistrictQuota": "districtQuota.json",
                    "Midnight Limit": "midnightQuota.json", 
                    "Email": "emailList.json"             
                };

                let successUploadCount = 0;

                for (const sheetName of workbook.SheetNames) {
                    if (sheetMapping[sheetName]) {
                        const worksheet = workbook.Sheets[sheetName];
                        const sheetRawJson = XLSX.utils.sheet_to_json(worksheet);
                        const targetFileName = sheetMapping[sheetName];
                        const UPLOAD_SECRET = "WKTS_UPLOAD_SECRET"; 

                        const response = await fetch(`https://vehicle-api.tdgwkts.workers.dev/api/upload/${targetFileName}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ secret: UPLOAD_SECRET, data: sheetRawJson })
                        });

                        if (response.ok) {
                            const resResult = await response.json();
                            if (resResult.success) successUploadCount++;
                        }
                    }
                }

                if (successUploadCount > 0) {
                    alert(`🎉 系統母檔解析成功！已自動分流更新了 ${successUploadCount} 個 R2 雲端儲存庫！`);
                    await loadVehicles(false);
                } else {
                    alert("⚠️ 未能成功匹配任何已知的工作表分頁，請確認分頁命名是否完全正確。");
                }
            } catch (err) {
                alert("解析失敗: " + err.message);
            } finally {
                showLoading(false);
                bootstrap.Modal.getInstance(document.getElementById('uploadModal')).hide();
            }
        }

        // ==================== 100% 融入原有結構的新増擴充函數：安全分權限智能導出 ====================
        async function exportExcel() {
            if (!currentUserSession) { alert("請先登入！"); return; }
            showLoading(true);
            try {
                const userRole = currentUserSession.role;
                const timeStamp = new Date().toISOString().split('T')[0];
                const wb = XLSX.utils.book_new();

                if (userRole === 'admin') {
                    // Admin 權限：一鍵無損打包下載 6 大核心數據工作表進行總體備份
                    const [vehicles, users, expired, districtQuota, midnightQuota, emailList] = await Promise.all([
                        fetch(WORKER_ENDPOINT, { method: 'POST', body: JSON.stringify({ action: 'getVehicles', session: currentUserSession }), headers: { 'Content-Type': 'application/json' } }).then(res => res.json()).then(d => d.data || []),
                        fetch(WORKER_ENDPOINT, { method: 'POST', body: JSON.stringify({ action: 'getUserList', session: currentUserSession }), headers: { 'Content-Type': 'application/json' } }).then(res => res.json()).then(d => d.users || []),
                        fetch(WORKER_ENDPOINT, { method: 'POST', body: JSON.stringify({ action: 'getExpired', session: currentUserSession }), headers: { 'Content-Type': 'application/json' } }).then(res => res.json()).then(d => d.data || []),
                        fetch(WORKER_ENDPOINT, { method: 'POST', body: JSON.stringify({ action: 'getDistrictQuota', session: currentUserSession }), headers: { 'Content-Type': 'application/json' } }).then(res => res.json()).then(d => d.data || []),
                        fetch(WORKER_ENDPOINT, { method: 'POST', body: JSON.stringify({ action: 'getMidnightQuota', session: currentUserSession }), headers: { 'Content-Type': 'application/json' } }).then(res => res.json()).then(d => d.data || []),
                        fetch(WORKER_ENDPOINT, { method: 'POST', body: JSON.stringify({ action: 'getEmailList', session: currentUserSession }), headers: { 'Content-Type': 'application/json' } }).then(res => res.json()).then(d => d.data || [])
                    ]);

                    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(vehicles), "Vehicles");
                    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(users), "Users");
                    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(expired), "Expired");
                    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(districtQuota), "DistrictQuota");
                    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(midnightQuota), "Midnight Limit");
                    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(emailList), "Email");

                    XLSX.writeFile(wb, `FEHD_MasterBackup_Full_${timeStamp}.xlsx`);
                } else {
                    // 非 Admin：僅過濾抓取其管轄行政分區的車輛，導出單一 "Vehicles" 工作表
                    const response = await fetch(WORKER_ENDPOINT, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'getVehicles', session: currentUserSession })
                    });
                    const result = await response.json();
                    const rawVehicles = result.data || [];

                    const finalAllowedList = rawVehicles.filter(v => {
                        if (Array.isArray(currentUserSession.viewDistricts)) {
                            return currentUserSession.viewDistricts.includes(v.district || v.所屬區域);
                        }
                        return (v.district || v.所屬區域) === currentUserSession.district;
                    });

                    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(finalAllowedList), "Vehicles");
                    XLSX.writeFile(wb, `FEHD_VehicleList_${currentUserSession.userId}_${timeStamp}.xlsx`);
                }
            } catch (err) {
                alert("匯出報表失敗: " + err.message);
            } finally {
                showLoading(false);
            }
        }
    </script>
